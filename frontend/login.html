<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Pâtisserie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="min-h-screen flex items-center justify-center p-6" style="background-image: linear-gradient(rgba(0, 0, 0, 0.35), rgba(0, 0, 0, 0.35)), url('/static/background2.png'); background-size: cover; background-attachment: fixed; background-position: center;">
    <div class="w-full max-w-xl bg-white bg-opacity-95 rounded-2xl shadow-2xl p-8 border-2 border-pink-200">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-pink-500 mb-2">Ultimate Pâtisserie</h1>
            <p class="text-gray-600">Connecte-toi pour commencer l'aventure</p>
        </div>

        <!-- Formulaire de Login -->
        <div id="login-form" class="space-y-4">
            <h2 class="text-2xl font-bold text-gray-800 text-center">Se connecter</h2>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Nom d'utilisateur</label>
                <input type="text" id="login-username" placeholder="alice" class="w-full px-4 py-3 border-2 border-pink-200 rounded-lg focus:border-pink-400 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Mot de passe</label>
                <input type="password" id="login-password" placeholder="password123" class="w-full px-4 py-3 border-2 border-pink-200 rounded-lg focus:border-pink-400 focus:outline-none">
            </div>
            <button onclick="handleLogin()" class="w-full bg-pink-400 text-white py-3 rounded-lg font-bold hover:bg-pink-500 transition">Se connecter</button>
            <div class="text-center text-sm text-gray-600">
                Pas de compte ? <a onclick="toggleForms()" class="text-pink-500 font-semibold hover:text-pink-600 cursor-pointer">S'inscrire</a>
            </div>
            <div id="login-error" class="hidden bg-red-100 text-red-700 px-4 py-3 rounded-lg text-sm font-semibold"></div>
        </div>

        <!-- Formulaire de Register -->
        <div id="register-form" class="hidden space-y-4">
            <h2 class="text-2xl font-bold text-gray-800 text-center">Créer un compte</h2>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Nom d'utilisateur</label>
                <input type="text" id="register-username" placeholder="alice" class="w-full px-4 py-3 border-2 border-pink-200 rounded-lg focus:border-pink-400 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
                <input type="email" id="register-email" placeholder="alice@example.com" class="w-full px-4 py-3 border-2 border-pink-200 rounded-lg focus:border-pink-400 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Prénom</label>
                <input type="text" id="register-first-name" placeholder="Alice" class="w-full px-4 py-3 border-2 border-pink-200 rounded-lg focus:border-pink-400 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Nom</label>
                <input type="text" id="register-last-name" placeholder="Dupont" class="w-full px-4 py-3 border-2 border-pink-200 rounded-lg focus:border-pink-400 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Mot de passe</label>
                <input type="password" id="register-password" placeholder="password123" class="w-full px-4 py-3 border-2 border-pink-200 rounded-lg focus:border-pink-400 focus:outline-none">
            </div>
            <button onclick="handleRegister()" class="w-full bg-pink-400 text-white py-3 rounded-lg font-bold hover:bg-pink-500 transition">S'inscrire</button>
            <div class="text-center text-sm text-gray-600">
                Déjà un compte ? <a onclick="toggleForms()" class="text-pink-500 font-semibold hover:text-pink-600 cursor-pointer">Se connecter</a>
            </div>
            <div id="register-error" class="hidden bg-red-100 text-red-700 px-4 py-3 rounded-lg text-sm font-semibold"></div>
        </div>
    </div>

    <script>
        function toggleForms() {
            document.getElementById('login-form').classList.toggle('hidden');
            document.getElementById('register-form').classList.toggle('hidden');
        }

        async function handleLogin() {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            if (!username || !password) {
                showError('login-error', 'Remplissez tous les champs');
                return;
            }

            try {
                console.log('Tentative de connexion...');
                const response = await fetch('http://localhost:8000/api/login/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                console.log('Réponse du serveur:', data);

                if (response.ok) {
                    console.log('Token reçu:', data.token);
                    console.log('Username:', data.user.username);
                    
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('username', data.user.username);
                    
                    console.log('Token sauvegardé:', localStorage.getItem('token'));
                    console.log('Username sauvegardé:', localStorage.getItem('username'));
                    
                    console.log('Redirection vers game.html...');
                    window.location.replace('/game.html');
                } else {
                    showError('login-error', data.error || 'Identifiants incorrects');
                }
            } catch (error) {
                showError('login-error', 'Erreur serveur');
                console.error('Erreur complète:', error);
            }
        }

        async function handleRegister() {
            const username = document.getElementById('register-username').value;
            const email = document.getElementById('register-email').value;
            const first_name = document.getElementById('register-first-name').value;
            const last_name = document.getElementById('register-last-name').value;
            const password = document.getElementById('register-password').value;

            if (!username || !email || !first_name || !last_name || !password) {
                showError('register-error', 'Remplissez tous les champs');
                return;
            }

            try {
                const response = await fetch('http://localhost:8000/api/register/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, first_name, last_name, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('username', data.user.username);
                    showSuccessNotification('Inscription réussie ! Bienvenue 🎉');
                    setTimeout(() => {
                        window.location.href = 'game.html';
                    }, 1400);
                } else {
                    showError('register-error', data.error || 'Erreur lors de l\'inscription');
                }
            } catch (error) {
                showError('register-error', 'Erreur serveur');
                console.error(error);
            }
        }

        function showSuccessNotification(message) {
            const existingToast = document.getElementById('success-toast');
            if (existingToast) {
                existingToast.remove();
            }

            const toast = document.createElement('div');
            toast.id = 'success-toast';
            toast.className = 'fixed top-6 right-6 z-50 bg-emerald-500 text-white px-5 py-4 rounded-xl shadow-2xl flex items-center gap-3';
            toast.innerHTML = `
                <i class="fas fa-circle-check text-xl"></i>
                <span class="font-semibold">${message}</span>
            `;

            document.body.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-1', 'transition', 'duration-300');
                setTimeout(() => toast.remove(), 320);
            }, 1000);
        }

        function showError(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.classList.remove('hidden');
        }
    </script>
</body>
</html>
