<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Matchs - Ultimate Pâtisserie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="flex flex-col min-h-screen pt-24 pb-32" style="background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('/static/background2.png'); background-size: cover; background-attachment: fixed; background-position: center;">
    <div id="header-placeholder" class="fixed top-0 left-0 right-0 z-50"></div>
    <script src="/static/header.js"></script>
    <script>
        fetch('/static/header.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('header-placeholder').innerHTML = html;
            });
    </script>

    <div class="flex-1 flex gap-6 mx-4">
        <div class="flex-1 bg-white bg-opacity-80 rounded-2xl shadow-lg p-8">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-4xl font-bold text-gray-800 flex items-center">
                    <i class="fas fa-swords text-pink-500 mr-2"></i>Matchs
                </h1>
                <button id="startMatchBtn" class="bg-gradient-to-r from-pink-500 to-purple-600 text-white px-6 py-2 rounded-lg font-bold hover:shadow-lg transition">
                    <i class="fas fa-play mr-2"></i>Nouveau Match
                </button>
            </div>

            <div id="matchesList" class="space-y-4"></div>
        </div>
    </div>

    <!-- Modal de lancement de match -->
    <div id="startMatchModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-8 max-w-3xl w-full m-4">
            <h2 class="text-3xl font-bold mb-6 text-center">
                <i class="fas fa-trophy text-yellow-500 mr-2"></i>Lancer un Match
            </h2>

            <div class="grid grid-cols-2 gap-6 mb-6">
                <!-- Équipe 1 -->
                <div class="border-2 border-pink-400 rounded-lg p-4">
                    <h3 class="font-bold text-pink-600 mb-3 text-center">Votre Gâteau</h3>
                    <select id="team1Select" class="w-full px-3 py-2 border-2 border-gray-300 rounded-lg focus:border-pink-500">
                        <option value="">Sélectionner...</option>
                    </select>
                    <div id="team1Preview" class="mt-3 text-sm text-gray-600"></div>
                </div>

                <!-- Équipe 2 -->
                <div class="border-2 border-purple-400 rounded-lg p-4">
                    <h3 class="font-bold text-purple-600 mb-3 text-center">Adversaire</h3>
                    <select id="team2Select" class="w-full px-3 py-2 border-2 border-gray-300 rounded-lg focus:border-purple-500">
                        <option value="">Sélectionner...</option>
                    </select>
                    <div id="team2Preview" class="mt-3 text-sm text-gray-600"></div>
                </div>
            </div>

            <div class="flex gap-4">
                <button id="cancelMatch" class="flex-1 bg-gray-300 text-gray-800 px-4 py-2 rounded-lg font-bold hover:bg-gray-400">Annuler</button>
                <button id="confirmMatch" class="flex-1 bg-gradient-to-r from-pink-500 to-purple-600 text-white px-4 py-2 rounded-lg font-bold hover:shadow-lg">Lancer le Match !</button>
            </div>
        </div>
    </div>

    <!-- Modal résultat -->
    <div id="resultModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-8 max-w-2xl w-full m-4 relative">
            <button id="closeResultX" class="absolute top-4 right-4 text-gray-500 hover:text-gray-700 text-2xl">
                <i class="fas fa-times"></i>
            </button>

            <h2 class="text-3xl font-bold mb-6 text-center">
                <i class="fas fa-flag-checkered text-green-500 mr-2"></i>Résultat du Match
            </h2>

            <div id="resultContent" class="space-y-4 mb-6"></div>

            <button id="closeResult" class="w-full bg-gradient-to-r from-pink-500 to-purple-600 text-white px-4 py-3 rounded-lg font-bold hover:shadow-lg transition">
                Fermer
            </button>
        </div>
    </div>

    <div id="nav-placeholder" class="fixed bottom-0 left-0 right-0 z-50"></div>
    <script src="/static/bottomNav.js"></script>
    <script>
        fetch('/static/bottomNav.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('nav-placeholder').innerHTML = html;
            });
    </script>

    <script>
        const API_URL = 'http://localhost:8000/api';
        const token = localStorage.getItem('token');

        let allTeams = [];
        let myTeamIds = [];

        if (!token) {
            window.location.href = 'login.html';
        }

        async function loadMyTeams() {
            try {
                const response = await fetch(`${API_URL}/teams/`, {
                    headers: { 'Authorization': `Token ${token}` }
                });
                const teams = await response.json();
                myTeamIds = teams.map(t => t.id);
                allTeams = teams;
            } catch (error) {
                console.error('Erreur lors du chargement des teams:', error);
            }
        }

        async function loadMatches() {
            try {
                const response = await fetch(`${API_URL}/matches/`, {
                    headers: { 'Authorization': `Token ${token}` }
                });
                const data = await response.json();

                if (response.ok && data.length > 0) {
                    displayMatches(data);
                } else {
                    document.getElementById('matchesList').innerHTML = 
                        '<div class="text-center py-12 text-gray-600">Aucun match joué pour le moment...</div>';
                }
            } catch (error) {
                console.error('Erreur:', error);
            }
        }

        function displayMatches(matches) {
            const matchesList = document.getElementById('matchesList');
            
            matchesList.innerHTML = matches.map(match => {
                const iMyTeamP1 = myTeamIds.includes(match.teamP1?.id);
                const myTeam = iMyTeamP1 ? match.teamP1 : match.teamP2;
                const adversaryTeam = iMyTeamP1 ? match.teamP2 : match.teamP1;
                const myScore = iMyTeamP1 ? match.score_player1 : match.score_player2;
                const adversaryScore = iMyTeamP1 ? match.score_player2 : match.score_player1;
                const isWinner = match.winner?.id === myTeam?.id;
                const winnerClass = isWinner ? 'border-green-500' : 'border-red-500';
                
                return `
                    <div class="bg-gradient-to-r from-pink-50 to-purple-50 rounded-xl border-2 ${winnerClass} p-6">
                        <div class="grid grid-cols-3 gap-4 items-center">
                            <div class="text-center">
                                <h3 class="font-bold text-xl ${isWinner ? 'text-green-600' : ''}">${myTeam?.name || 'N/A'}</h3>
                                <p class="text-3xl font-bold text-pink-600">${myScore}</p>
                            </div>
                            
                            <div class="text-center">
                                <i class="fas fa-crossed-swords text-4xl text-gray-400"></i>
                                <p class="text-sm text-gray-600 mt-2">${new Date(match.date).toLocaleDateString()}</p>
                            </div>
                            
                            <div class="text-center">
                                <h3 class="font-bold text-xl ${!isWinner ? 'text-green-600' : ''}">${adversaryTeam?.name || 'N/A'}</h3>
                                <p class="text-3xl font-bold text-purple-600">${adversaryScore}</p>
                            </div>
                        </div>
                        
                        <div class="text-center mt-4">
                            ${isWinner 
                                ? '<span class="bg-green-500 text-white px-4 py-1 rounded-full text-sm font-bold"><i class="fas fa-trophy mr-1"></i>Victoire</span>' 
                                : '<span class="bg-red-500 text-white px-4 py-1 rounded-full text-sm font-bold"><i class="fas fa-times mr-1"></i>Défaite</span>'}
                        </div>
                    </div>
                `;
            }).join('');
        }

        document.getElementById('startMatchBtn').addEventListener('click', async () => {
            await loadTeamsForMatch();
            document.getElementById('startMatchModal').classList.remove('hidden');
        });

        document.getElementById('cancelMatch').addEventListener('click', () => {
            document.getElementById('startMatchModal').classList.add('hidden');
        });

        document.getElementById('closeResult').addEventListener('click', () => {
            document.getElementById('resultModal').classList.add('hidden');
            loadMatches();
        });

        document.getElementById('closeResultX').addEventListener('click', () => {
            document.getElementById('resultModal').classList.add('hidden');
            loadMatches();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const resultModal = document.getElementById('resultModal');
                const startMatchModal = document.getElementById('startMatchModal');
                
                if (!resultModal.classList.contains('hidden')) {
                    resultModal.classList.add('hidden');
                    loadMatches();
                } else if (!startMatchModal.classList.contains('hidden')) {
                    startMatchModal.classList.add('hidden');
                }
            }
        });

        async function loadTeamsForMatch() {
            try {
                const myTeamsResponse = await fetch(`${API_URL}/teams/`, {
                    headers: { 'Authorization': `Token ${token}` }
                });
                const myTeams = await myTeamsResponse.json();

                if (myTeams.length === 0) {
                    alert('⚠️ Vous devez créer au least un gâteau !');
                    document.getElementById('startMatchModal').classList.add('hidden');
                    return;
                }

                const adversaryTeamsResponse = await fetch(`${API_URL}/adversary-teams/`, {
                    headers: { 'Authorization': `Token ${token}` }
                });
                const adversaryTeams = await adversaryTeamsResponse.json();

                const team1Select = document.getElementById('team1Select');
                const team2Select = document.getElementById('team2Select');

                team1Select.innerHTML = '<option value="">Sélectionner...</option>' + 
                    myTeams.map(t => `<option value="${t.id}">${t.name}</option>`).join('');

                team2Select.innerHTML = '<option value="">Sélectionner...</option>' + 
                    adversaryTeams.map(t => `<option value="${t.id}">${t.name} (${t.owner.user.username})</option>`).join('');

                allTeams = [...myTeams, ...adversaryTeams];
                myTeamIds = myTeams.map(t => t.id);

                team1Select.onchange = () => updatePreview(1);
                team2Select.onchange = () => updatePreview(2);
            } catch (error) {
                console.error('Erreur:', error);
            }
        }

        function updatePreview(teamNum) {
            const select = document.getElementById(`team${teamNum}Select`);
            const preview = document.getElementById(`team${teamNum}Preview`);
            const teamId = parseInt(select.value);

            if (!teamId) {
                preview.innerHTML = '';
                return;
            }

            const team = allTeams.find(t => t.id === teamId);
            if (!team) return;

            preview.innerHTML = `
                <div class="bg-white rounded p-2 space-y-1">
                    <p><i class="fas fa-layer-group text-pink-500"></i> ${team.base?.card?.name || 'N/A'}</p>
                    <p><i class="fas fa-ice-cream text-purple-500"></i> ${team.cream?.card?.name || 'N/A'}</p>
                    ${team.filling ? `<p><i class="fas fa-cookie-bite text-yellow-500"></i> ${team.filling.card.name}</p>` : ''}
                    ${team.glaze ? `<p><i class="fas fa-droplet text-blue-500"></i> ${team.glaze.card.name}</p>` : ''}
                </div>
            `;
        }

        document.getElementById('confirmMatch').addEventListener('click', async () => {
            const team1Id = parseInt(document.getElementById('team1Select').value);
            const team2Id = parseInt(document.getElementById('team2Select').value);

            if (!team1Id || !team2Id) {
                alert('⚠️ Sélectionnez les deux gâteaux !');
                return;
            }

            if (team1Id === team2Id) {
                alert('⚠️ Vous ne pouvez pas affronter le même gâteau !');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/matches/`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        team1_id: team1Id,
                        team2_id: team2Id
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('startMatchModal').classList.add('hidden');
                    showResult(data);
                    if (typeof loadPlayerInfo === 'function') {
                        loadPlayerInfo();
                    }
                } else {
                    alert('❌ Erreur: ' + (data.error || JSON.stringify(data)));
                }
            } catch (error) {
                console.error('Erreur:', error);
                alert('❌ Erreur lors du match');
            }
        });

        function showResult(match) {
            const team1 = match.teamP1;
            const team2 = match.teamP2;
            
            if (!team1 || !team2) {
                alert('❌ Erreur: impossible de charger les équipes');
                return;
            }
            
            const isWinner = match.winner?.id === team1.id;
            const moneyChange = match.money_won || 0;
            const moneyChangeText = moneyChange > 0 
                ? `<span class="text-green-600">+${moneyChange}$</span>` 
                : `<span class="text-red-600">${moneyChange}$</span>`;

            document.getElementById('resultContent').innerHTML = `
                <div class="bg-gradient-to-r from-yellow-100 to-yellow-200 rounded-lg p-6 text-center">
                    <i class="fas fa-trophy text-6xl text-yellow-500 mb-4"></i>
                    <h3 class="text-2xl font-bold mb-2">${isWinner ? '🎉 Victoire !' : '😔 Défaite'}</h3>
                    <p class="text-xl font-bold mt-2">${moneyChangeText}</p>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="text-center p-4 bg-pink-100 rounded-lg ${isWinner ? 'ring-4 ring-green-500' : ''}">
                        <h4 class="font-bold text-lg mb-2">${team1.name}</h4>
                        <p class="text-4xl font-bold text-pink-600">${match.score_player1}</p>
                    </div>
                    
                    <div class="text-center p-4 bg-purple-100 rounded-lg ${!isWinner ? 'ring-4 ring-green-500' : ''}">
                        <h4 class="font-bold text-lg mb-2">${team2.name}</h4>
                        <p class="text-4xl font-bold text-purple-600">${match.score_player2}</p>
                    </div>
                </div>
            `;

            document.getElementById('resultModal').classList.remove('hidden');
        }

        loadMyTeams().then(() => loadMatches());
    </script>
</body>
</html>
