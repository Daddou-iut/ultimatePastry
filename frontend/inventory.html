<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Inventaire - Ultimate Pâtisserie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/static/cardGenerator.js"></script>
</head>
<body class="flex flex-col min-h-screen pt-24 pb-32" style="background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('/static/background2.png'); background-size: cover; background-attachment: fixed; background-position: center;">
    <div id="header-placeholder" class="fixed top-0 left-0 right-0 z-50"></div>
    <script src="/static/header.js"></script>
    <script>
        // Charger le header.html
        fetch('/static/header.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('header-placeholder').innerHTML = html;
            });
    </script>

    <!-- Remplace ta div "flex-1 flex flex-col" par celle-ci -->
    <div class="flex-1 flex gap-6 mr-4 ml-4">
        <!-- Inventaire à gauche (avec flex-1 pour prendre la place) -->
        <div class="flex-1 bg-white bg-opacity-80 rounded-2xl shadow-lg p-8" id="inventoryContainer">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-4xl font-bold text-gray-800 flex items-center">
                    <i class="fas fa-backpack text-pink-500 mr-2"></i>Mes cartes
                </h1>
                <button id="mergeBtn" class="bg-gradient-to-r from-pink-500 to-purple-600 text-white px-6 py-2 rounded-lg font-bold hover:shadow-lg transition">
                    <i class="fas fa-wand-magic-sparkles mr-2"></i>Mode Fusion
                </button>
            </div>

            <div id="mergeInfo" class="hidden mb-4 p-4 bg-yellow-100 border-l-4 border-yellow-500 rounded">
                <p class="text-yellow-800 font-semibold"><i class="fas fa-info-circle mr-2"></i>Mode fusion activé</p>
                <p class="text-yellow-700">Glissez-déposez deux cartes identiques dans la zone à droite pour les fusionner.</p>
            </div>
            
            <div id="inventory" class="grid grid-cols-6 gap-6"></div>
        </div>

        <!-- Zone de dépôt fixe à droite (entre header et footer) -->
        <div id="dropZone" class="hidden fixed top-24 right-4 bottom-32 w-79 bg-gradient-to-b from-purple-100 to-pink-100 rounded-2xl shadow-lg p-2 border-4 border-dashed border-purple-400 flex flex-col items-center justify-center overflow-y-auto ml-2 z-40">
            <i class="fas fa-hand-holding-droplet text-purple-500 text-5xl mb-1"></i>
            <p class="text-center text-purple-700 font-bold mb-1">Déposez 2 cartes identiques ici</p>
            <div id="dropZoneCards" class="w-full flex-1 flex flex-col  justify-center"></div>
            <button id="cancelMergeBtn" class="mt-4 w-full bg-red-500 hover:bg-red-600 text-white px-3 py-2 rounded-lg font-bold transition text-sm">
                <i class="fas fa-times mr-1"></i>Annuler
            </button>
        </div>
    </div>

    <div id="nav-placeholder" class="fixed bottom-0 left-0 right-0 z-50"></div>
    <script src="/static/bottomNav.js"></script>
    <script>
        // Charger bottomNav.html
        fetch('/static/bottomNav.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('nav-placeholder').innerHTML = html;
            });
    </script>

    <script>
        const API_URL = 'http://localhost:8000/api';
        const token = localStorage.getItem('token');

        let mergeMode = false;
        let droppedCards = [];
        let allCards = [];

        if (!token) {
            window.location.href = 'login.html';
        }

        function updateInventoryGridColumns() {
            const inventory = document.getElementById('inventory');
            if (!inventory) return;

            inventory.classList.remove('grid-cols-5', 'grid-cols-6');
            inventory.classList.add(mergeMode ? 'grid-cols-5' : 'grid-cols-6');
        }

    

        async function loadInventory() {
            try {
                const response = await fetch(`${API_URL}/inventory/`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Token ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    allCards = data;
                    displayInventory(data);
                } else {
                    alert('Erreur : ' + data.error);
                }
            } catch (error) {
                console.error('Erreur:', error);
            }
        }

        function displayInventory(cards) {
            const inventory = document.getElementById('inventory');
            
            if (cards.length === 0) {
                inventory.innerHTML = '<div class="col-span-full text-center py-12"><p class="text-gray-600 text-xl"><i class="fas fa-inbox text-4xl text-pink-400 mb-4"></i><br>Ton inventaire est vide. Ouvre un pack !</p></div>';
                return;
            }

            inventory.innerHTML = cards.map((cardInstance) => {
                const card = cardInstance.card;
                const svg = generateCardSVG(card);
                
                return `
                    <div class="relative bg-white rounded-lg shadow-lg p-4 hover:shadow-xl transition overflow-hidden cursor-move card-item" 
                        draggable="${mergeMode ? 'true' : 'false'}"
                        data-card-id="${cardInstance.id}"
                        data-card-instance='${JSON.stringify(cardInstance)}'>
                        ${svg}
                        <div class="absolute bottom-2 left-2 bg-gray-800 text-white px-2 py-1 rounded text-xs font-bold">
                            Lvl ${cardInstance.level}
                        </div>
                    </div>
                `;
            }).join('');

            // Ajouter les listeners drag/drop
            if (mergeMode) {
                document.querySelectorAll('.card-item').forEach(cardElement => {
                    cardElement.addEventListener('dragstart', handleDragStart);
                    cardElement.addEventListener('dragend', handleDragEnd);
                });
            }
        }

        let draggedCard = null;

        function handleDragStart(event) {
            draggedCard = JSON.parse(event.currentTarget.getAttribute('data-card-instance'));
            event.currentTarget.style.opacity = '0.5';
            event.dataTransfer.effectAllowed = 'move';
        }

        function handleDragEnd(event) {
            event.currentTarget.style.opacity = '1';
        }

        // Zone de dépôt
        const dropZone = document.getElementById('dropZone');

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            dropZone.style.backgroundColor = 'rgba(168, 85, 247, 0.2)';
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.style.backgroundColor = '';
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.backgroundColor = '';
            
            if (!draggedCard) return;
            
            console.log('🟢 Dropped card:', draggedCard);
            console.log('🟢 Current droppedCards:', droppedCards);
            
            // Vérifier si déjà dans la zone
            const alreadyAdded = droppedCards.find(c => c.id === draggedCard.id);
            if (alreadyAdded) {
                alert('⚠️ Cette carte est déjà dans la zone !');
                return;
            }
            
            // Ajouter la carte
            droppedCards.push(draggedCard);
            updateDropZone();
            
            // Si 2 cartes, vérifier et fusionner
            if (droppedCards.length === 2) {
                console.log('🔍 Checking cards:', {
                    card1_id: droppedCards[0].card.id,
                    card1_name: droppedCards[0].card.name,
                    card2_id: droppedCards[1].card.id,
                    card2_name: droppedCards[1].card.name
                });
                
                if (droppedCards[0].card.id !== droppedCards[1].card.id) {
                    alert('⚠️ Vous ne pouvez fusionner que deux cartes identiques !');
                    droppedCards = [];
                    updateDropZone();
                    return;
                }
                showMergeModal();
            }
        });

        function updateDropZone() {
            const dropZoneCards = document.getElementById('dropZoneCards');
            dropZoneCards.innerHTML = [0, 1].map((index) => {
                const card = droppedCards[index];

                if (!card) {
                    return `
                        <div class="relative w-full h-60 rounded-xl border-2 border-dashed border-purple-400 bg-white/60 flex items-center justify-center">
                            <p class="text-purple-500 text-sm font-semibold">Slot ${index + 1}</p>
                        </div>
                    `;
                }

                const svg = generateCardSVG(card.card);
                return `
                    <div class="relative w-full h-60 rounded-xl border-2 border-purple-500 bg-white overflow-hidden shadow">
                        <button onclick="removeFromDropZone(${index})" class="absolute top-1 right-1 z-10 bg-red-500 hover:bg-red-600 text-white w-6 h-6 rounded-full text-xs flex items-center justify-center">
                            <i class="fas fa-times"></i>
                        </button>
                        <div class="w-full h-full p-1 overflow-hidden">${svg}</div>
                    </div>
                `;
            }).join('');
        }

        function removeFromDropZone(index) {
            droppedCards.splice(index, 1);
            updateDropZone();
        }

        function showMergeModal() {
            document.getElementById('mergeModal').classList.remove('hidden');
        }

        function hideMergeModal() {
            document.getElementById('mergeModal').classList.add('hidden');
        }

        async function mergeTwoCards() {
            if (droppedCards.length !== 2) {
                alert('⚠️ Veuillez déposer exactement deux cartes');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/merge-cards/`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        card_instance_id_1: droppedCards[0].id,
                        card_instance_id_2: droppedCards[1].id
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    hideMergeModal();
                    droppedCards = [];
                    updateDropZone();
                    
                    const successMsg = document.createElement('div');
                    successMsg.className = 'fixed top-8 right-8 bg-green-500 text-white p-4 rounded-lg shadow-lg flex items-center gap-2 z-50';
                    successMsg.innerHTML = `
                        <i class="fas fa-check-circle text-2xl"></i>
                        <div>
                            <p class="font-bold">Fusion réussie!</p>
                            <p class="text-sm">Niveau: ${data.merged_card.level}</p>
                        </div>
                    `;
                    document.body.appendChild(successMsg);
                    
                    setTimeout(() => {
                        successMsg.remove();
                        mergeMode = false;
                        document.getElementById('mergeInfo').classList.add('hidden');
                        document.getElementById('dropZone').classList.add('hidden');
                        document.getElementById('inventoryContainer').classList.remove('mr-80');
                        document.getElementById('mergeBtn').classList.remove('bg-purple-700');
                        updateInventoryGridColumns();
                        loadInventory();
                    }, 2500);
                } else {
                    alert('❌ Erreur : ' + data.error);
                    droppedCards = [];
                    hideMergeModal();
                    updateDropZone();
                }
            } catch (error) {
                console.error('Erreur:', error);
                alert('❌ Erreur lors de la fusion des cartes');
            }
        }

        loadInventory();

        function initializeInventory() {
            const mergeBtn = document.getElementById('mergeBtn');
            if (!mergeBtn) {
                setTimeout(initializeInventory, 100);
                return;
            }

                // Maintenant ajoute les listeners
            mergeBtn.addEventListener('click', () => {
                mergeMode = !mergeMode;
                droppedCards = [];
                
                const dropZone = document.getElementById('dropZone');
                const inventoryContainer = document.getElementById('inventoryContainer');
                
                dropZone.classList.toggle('hidden', !mergeMode);
                document.getElementById('mergeInfo').classList.toggle('hidden', !mergeMode);
                inventoryContainer.classList.toggle('mr-80', mergeMode);
                mergeBtn.classList.toggle('bg-purple-700', mergeMode);
                updateInventoryGridColumns();
                updateDropZone();
                
                loadInventory();
            });

            // Bouton annuler
            const cancelBtn = document.getElementById('cancelMergeBtn');
            if (cancelBtn) {
                cancelBtn.addEventListener('click', () => {
                    mergeMode = false;
                    droppedCards = [];
                    
                    const dropZone = document.getElementById('dropZone');
                    const inventoryContainer = document.getElementById('inventoryContainer');
                    
                    dropZone.classList.add('hidden');
                    document.getElementById('mergeInfo').classList.add('hidden');
                    inventoryContainer.classList.remove('mr-80');
                    mergeBtn.classList.remove('bg-purple-700');
                    updateInventoryGridColumns();
                    updateDropZone();
                    
                    loadInventory();
                });
            }


        }

        initializeInventory();
        updateInventoryGridColumns();
        updateDropZone();
    </script>

<!-- Modal de confirmation -->
    <div id="mergeModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-8 max-w-md">
            <h2 class="text-2xl font-bold mb-4"><i class="fas fa-wand-magic-sparkles text-purple-600 mr-2"></i>Confirmer la fusion</h2>
            <div class="mb-6">
                <p class="text-gray-700 mb-2">Êtes-vous sûr de vouloir fusionner ces deux cartes ?</p>
                <p class="text-sm text-gray-500">Une carte sera supprimée et l'autre verra son niveau augmenté.</p>
            </div>
            <div class="flex gap-4">
                <button id="cancelMerge" class="flex-1 bg-gray-300 text-gray-800 px-4 py-2 rounded-lg font-bold hover:bg-gray-400">Annuler</button>
                <button id="confirmMerge" class="flex-1 bg-gradient-to-r from-pink-500 to-purple-600 text-white px-4 py-2 rounded-lg font-bold hover:shadow-lg">Fusionner</button>
            </div>
        </div>
    </div>

    <script>
        // Ajouter les listeners des boutons de la modal MAINTENANT que la modal existe
        document.getElementById('cancelMerge').addEventListener('click', () => {
            droppedCards = [];
            hideMergeModal();
            updateDropZone();
        });

        document.getElementById('confirmMerge').addEventListener('click', mergeTwoCards);
    </script>
</body>
</html>
