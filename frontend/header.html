<?xml version="1.0" encoding="UTF-8"?>
<header class="bg-gradient-to-b from-pink-200 to-pink-400 shadow-lg text-white">
    <div class="flex justify-between items-center px-6 py-4">
        <button class="text-2xl hover:bg-rose-400 p-2 rounded" onclick="toggleMenu()">
            <i class="fas fa-bars"></i>
        </button>
        <h1 class="text-2xl font-bold text-white">Ultimate Pâtisserie - Game</h1>

        <div class="flex items-center gap-4">
            <div class="bg-yellow-300 text-gray-800 px-4 py-2 rounded-full font-bold flex items-center gap-2 cursor-pointer hover:bg-yellow-400 transition" onclick="cheatAddMoney()" title="Cheat code: Click for +1000 coins!">
                <i class="fas fa-coins"></i>
                <span id="money-display">1000</span>
            </div>
            
            <div id="profile-pic-small" class="w-10 h-10 rounded-full bg-gray-200 border-2 border-white flex items-center justify-center overflow-hidden" onclick="window.location.href='game.html'">
                <i class="fas fa-user text-gray-400"></i>
            </div>
            
            <button class="text-2xl hover:bg-red-600 p-2 rounded text-white" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </div>
</header>

    </div>
</header>
